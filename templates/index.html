<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB 방문 신청 대시보드</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--primary); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 800px; }
        h1 { text-align: center; margin-bottom: 2rem; font-weight: 300; }
        .section { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        select, .grid { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; background: #f9f9f9; padding: 15px; box-sizing: border-box; }
        .checkbox-item { display: flex; align-items: center; font-size: 0.9rem; cursor: pointer; }
        .checkbox-item input { margin-right: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 2rem; }
        button { flex: 1; padding: 1rem; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .btn-apply { background-color: var(--accent); color: white; font-weight: bold; }
        .btn-clear { background-color: #95a5a6; color: white; }
        
        #status-container { margin-top: 1.5rem; display: none; }
        .progress-wrapper { width: 100%; background-color: #ddd; border-radius: 20px; height: 25px; overflow: hidden; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background-color: var(--accent); transition: width 0.4s ease; text-align: center; color: white; line-height: 25px; font-size: 0.8rem; font-weight: bold; }
        #status-message { text-align: center; font-size: 0.9rem; margin-top: 5px; color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <h1>DB 방문 신청 시스템</h1>
        
        <div class="section">
            <label>신청자 선택</label>
            <select id="applicant">
                {% for name in applicants.keys() %}
                <option value="{{ name }}">{{ name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="section">
            <label>담당자 선택</label>
            <select id="customer">
                {% for cust in customers %}
                <option value="{{ cust }}">{{ cust }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="section">
            <label>방문 날짜 선택</label>
            <div class="grid">
                {% for d in dates %}
                <label class="checkbox-item"><input type="checkbox" name="dates" value="{{ d.val }}"> {{ d.label }}</label>
                {% endfor %}
            </div>
        </div>

        <div class="section">
            <label>동행 동료 선택</label>
            <div class="grid" id="colleague-grid">
                {% for name in applicants.keys() %}
                <label class="checkbox-item colleague-item" data-name="{{ name }}">
                    <input type="checkbox" name="colleagues" value="{{ name }}"> {{ name }}
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-apply" id="submit-btn" onclick="submitForm()">신청하기</button>
            <button class="btn-clear" onclick="clearForm()">초기화</button>
        </div>

        <div id="status-container">
            <div id="status-message">진행 준비 중...</div>
            <div class="progress-wrapper">
                <div id="progress-bar">0%</div>
            </div>
        </div>
    </div>

    <script>
        const applicantSelect = document.getElementById('applicant');
        const colleagueItems = document.querySelectorAll('.colleague-item');
        const submitBtn = document.getElementById('submit-btn');
        const statusContainer = document.getElementById('status-container');
        const progressBar = document.getElementById('progress-bar');
        const statusMessage = document.getElementById('status-message');

        function updateColleagueList() {
            const currentApplicant = applicantSelect.value;
            colleagueItems.forEach(item => {
                const checkbox = item.querySelector('input');
                item.style.display = item.dataset.name === currentApplicant ? 'none' : 'flex';
                if (item.dataset.name === currentApplicant) checkbox.checked = false;
            });
        }
        applicantSelect.addEventListener('change', updateColleagueList);
        updateColleagueList();

        async function submitForm() {
            const dates = Array.from(document.querySelectorAll('input[name="dates"]:checked')).map(cb => cb.value);
            const colleagues = Array.from(document.querySelectorAll('input[name="colleagues"]:checked')).map(cb => cb.value);
            
            if (dates.length === 0) return alert('날짜를 선택해주세요.');

            submitBtn.disabled = true;
            statusContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.innerText = '0%';
            statusMessage.innerText = '신청을 시작합니다...';

            try {
                const response = await fetch('/apply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        applicant: applicantSelect.value,
                        customer: document.getElementById('customer').value,
                        dates: dates,
                        colleagues: colleagues
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`서버 에러 (${response.status}): ${errorText.substring(0, 100)}...`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim());
                    
                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            progressBar.style.width = data.progress + '%';
                            progressBar.innerText = data.progress + '%';
                            statusMessage.innerText = data.message;
                            if (data.progress === 100) submitBtn.disabled = false;
                        } catch (e) {
                            console.error('JSON 파싱 에러:', line);
                        }
                    }
                }
            } catch (error) {
                statusMessage.innerText = '❌ 오류 발생: ' + error.message;
                submitBtn.disabled = false;
            }
        }

        function clearForm() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            statusContainer.style.display = 'none';
            submitBtn.disabled = false;
        }
    </script>
</body>
</html>
